name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Get your code
      - uses: actions/checkout@v4

      # 2) Setup pnpm (NO version → avoids conflict)
      - uses: pnpm/action-setup@v4

      # 3) Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # 4) Install deps INSIDE client
      - name: Install
        working-directory: client
        run: pnpm install --no-frozen-lockfile

      # 5) Build INSIDE client
      - name: Build
        working-directory: client
        run: pnpm run build

      # 6) Upload built site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
